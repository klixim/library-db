<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar navbar-expand navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Городская Библиотека</a>
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/">Каталог</a></li>
                <li class="nav-item reader-only" style="display: none;"><a class="nav-link active" href="/profile.html">Личный кабинет</a></li>
                <li class="nav-item admin-only" style="display: none;"><a class="nav-link" href="/admin.html">Админ-панель</a></li>
            </ul>
            <div class="d-flex align-items-center">
                <button id="loginBtn" class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#loginModal">Войти</button>
                <div id="userInfo" class="text-light d-none"><span class="me-3">Роль: <strong id="userRole"></strong></span><button id="logoutBtn" class="btn btn-sm btn-danger">Выйти</button></div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Мои книги на руках</h2>
        <ul class="list-group mb-5 shadow-sm" id="current-loans-list">
            <li class="list-group-item">Загрузка...</li>
        </ul>
        <h2>История прочитанного</h2>
        <ul class="list-group shadow-sm" id="history-loans-list">
            <li class="list-group-item">Загрузка...</li>
        </ul>
    </div>

    <!-- Модальное окно авторизации -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="loginModalLabel">Вход в систему</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3"><label class="form-label">Логин</label><input type="text" class="form-control" id="username" required></div>
                        <div class="mb-3"><label class="form-label">Пароль</label><input type="password" class="form-control" id="password" required></div>
                        <div id="loginError" class="text-danger d-none mb-3">Неверный логин или пароль</div>
                        <button type="submit" class="btn btn-primary w-100">Войти</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
