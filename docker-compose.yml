services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: libuser
      POSTGRES_PASSWORD: libpassword
      POSTGRES_DB: library
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@library.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5059:80"
    depends_on:
      - db
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=libuser
      - DB_PASSWORD=libpassword
      - DB_NAME=library
    restart: unless-stopped

volumes:
  postgres_data: